app = "taskflow-cwti"
primary_region = "gru"

[env]
  PORT = "3000"
  JWT_SECRET = "taskflow-prod-secret-2026"
  DB_PATH = "/data/taskflow.db"

[[services]]
  protocol = "tcp"
  internal_port = 3000

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[mounts]
  source = "taskflow_data"
  destination = "/data"

[deploy]
  # Sincroniza /data/public con la imagen Docker (/app/public) cada deploy.
  # Garantiza que el HTML servido por /data/public (vía express.static) siempre
  # sea la versión más reciente de la imagen, sin tener que entrar por SSH.
  release_command = "mkdir -p /data/public && cp /app/public/index.html /data/public/index.html && cp /app/public/soporte.html /data/public/soporte.html 2>/dev/null; cp /app/server.js /data/server.js 2>/dev/null; echo '[release] /data/public synced from image'"
