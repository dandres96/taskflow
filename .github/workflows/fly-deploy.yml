name: Deploy to Fly.io (autoclaw pattern)

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: fly-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Sync files to Fly volume & restart machine
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Authenticate flyctl
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl auth token "$FLY_API_TOKEN"
          flyctl auth whoami

      - name: Get machine ID
        id: get-machine
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          MACHINE_ID=$(flyctl machines list --app taskflow-cwti --json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d[0]['id'])")
          echo "machine_id=$MACHINE_ID" >> $GITHUB_OUTPUT
          echo "Machine ID: $MACHINE_ID"

      - name: Upload index.html via SFTP
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # SFTP doesn't overwrite by default - remove first
          flyctl ssh console --app taskflow-cwti -C "rm -f /data/public/index.html"
          flyctl sftp put --app taskflow-cwti public/index.html /data/public/index.html
          echo "Uploaded index.html"

      - name: Upload soporte.html via SFTP
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl ssh console --app taskflow-cwti -C "rm -f /data/public/soporte.html"
          flyctl sftp put --app taskflow-cwti public/soporte.html /data/public/soporte.html
          echo "Uploaded soporte.html"

      - name: Upload server.js via SFTP (if changed)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl ssh console --app taskflow-cwti -C "rm -f /data/server.js"
          flyctl sftp put --app taskflow-cwti server.js /data/server.js
          echo "Uploaded server.js"

      - name: Upload package.json via SFTP (if changed)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl ssh console --app taskflow-cwti -C "rm -f /data/package.json"
          flyctl sftp put --app taskflow-cwti package.json /data/package.json
          echo "Uploaded package.json"

      - name: Restart machine
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          MACHINE_ID="${{ steps.get-machine.outputs.machine_id }}"
          echo "Restarting machine: $MACHINE_ID"
          # First sync the latest /data/* files into /app/* so when the machine
          # boots up, it picks up the new server.js / index.html
          flyctl ssh console --app taskflow-cwti -C "cp /data/server.js /app/server.js && cp /data/public/index.html /app/public/index.html && cp /data/public/soporte.html /app/public/soporte.html && cp /data/package.json /app/package.json 2>/dev/null; echo sync-done"
          # Now restart the entire machine - this guarantees a fresh node process
          # with the new server.js
          flyctl machine restart "$MACHINE_ID" --app taskflow-cwti
          echo "machine restart signal sent"

      - name: Wait for restart
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # Machine restart can take 20-30s, then Node needs to boot
          echo "Waiting for machine to come back..."
          sleep 30
          for i in 1 2 3 4 5 6 7 8; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://taskflow-cwti.fly.dev/ || echo "000")
            echo "Attempt $i: HTTP $HTTP"
            if [ "$HTTP" = "200" ]; then
              echo "App is up."
              break
            fi
            sleep 8
          done

      - name: Smoke test
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "--- Home page ---"
          curl -s -o /dev/null -w "HTTP %{http_code}\n" https://taskflow-cwti.fly.dev/
          echo "--- Login API ---"
          curl -s -o /dev/null -w "HTTP %{http_code}\n" \
            -X POST https://taskflow-cwti.fly.dev/api/login \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@taskflow.local","password":"admin123"}'
          echo "--- Toolbar visible? ---"
          HTML=$(curl -s https://taskflow-cwti.fly.dev/)
          if echo "$HTML" | grep -q '<div class="toolbar"'; then
            if echo "$HTML" | grep -q 'class="toolbar" style="display: none;"'; then
              echo "❌ TOOLBAR STILL HIDDEN"
              exit 1
            else
              echo "✅ Toolbar visible"
            fi
          else
            echo "⚠️  Could not find toolbar class"
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy failed. Check logs above."
          flyctl logs --app taskflow-cwti || true